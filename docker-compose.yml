version: "3.9"

services:
  bot:
    build: .
    container_name: dsrbotz_mx_bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./downloads:/app/downloads
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    container_name: dsrbotz_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
